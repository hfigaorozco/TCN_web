<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Transportes Cuervo Negro</title>
    <link rel="stylesheet" href="../statics/css/login.css">
</head>
<body>

<div class="page-wrapper">

    <main class="container">

        <section class="image-section" aria-hidden="true">
            <img src="../statics/images/bus login.png" alt="Autobús de TCN en carretera">
        </section>

        <section class="form-section">

            <header class="form-header">
                <img src="../statics/images/logo.png" alt="Logo Transportes Cuervo Negro" class="logo">
                <h1>¡Hola, identifícate!</h1>
                <p>
                    Accede para descubrir las funcionalidades de la aplicación web
                    de Transportes Cuervo Negro.
                </p>
            </header>

            <form action="" method="post" novalidate>

                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" maxlength="40" placeholder="Ingresa tu correo electrónico" required>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" maxlength="32" placeholder="Ingresa tu contraseña" required>
                </div>

                <button type="submit" class="btn-primary" id="btn-iniciarSesion">
                    Iniciar sesión
                </button>

            </form>

        </section>

    </main>

</div>

</body>
</html>
