<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Transportes Cuervo Negro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../statics/images/LOGO TCN azul.png">
    <link rel="stylesheet" href="../statics/css/corridas.css">
</head>

<body>

    <div class="top-nav">

        <div class="logo-box">
            <img src="../statics/images/logo.png" alt="Logo TCN" height="80px">
        </div>

        <div class="menu-box">
            <ul class="menu">
                <li><a href="dashboard.html">Home</a></li>
                <li><a href="#">Reservaciones</a></li>
                <li class="activea"><a href="corridas.html">Corridas</a></li>
                <li><a href="rutas.html">Rutas</a></li>
                <li><a href="operadores.html">Operadores</a></li>
                <li><a href="autobuses.html">Autobuses</a></li>
            </ul>
        </div>

    </div>

    <div class="container">
        <h1 class="title">Corridas</h1>

        <div class="cards">

            <div class="card active-card">
                <span>Corridas Activas</span>
                <h2>36</h2>
            </div>

            <div class="card">
                <span>Pasajeros</span>
                <h2>8</h2>
            </div>

            <div class = "filter-boxes">
                <div class="filter-box">
                    <h2>Número</h2>
                    <input type="number" min="0" placeholder="Número" class="input">
                </div>

                <div class="filter-box">
                    <h2>Origen</h2>
                    <select>
                        <option selected disabled>Origen</option>
                        <option>Todos</option>
                        <option>Ensenada</option>
                        <option>San Felipe</option>
                        <option>San Quintín</option>
                        <option>Mexicali</option>
                        <option>Tecate</option>
                        <option>Tijuana</option>
                    </select>
                </div>

                <div class="filter-box">
                    <h2>Destino</h2>
                    <select>
                        <option selected disabled>Destino</option>
                        <option>Todos</option>
                        <option>Ensenada</option>
                        <option>San Felipe</option>
                        <option>San Quintín</option>
                        <option>Mexicali</option>
                        <option>Tecate</option>
                        <option>Tijuana</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <!--*********************************DIALOGO PARA AGREGAR*********************************-->
    <dialog id="agregar" class="dialog-agregar">
        <h1>Agregar Corrida</h1>
        <form>
            <DIV>
                <div class="cajitas">
                    <div>
                        <h3>Ruta</h3>
                        <select class="ruta">
                            <option selected disabled>Ruta</option>
                            <option>TIJ-TEC</option>
                            <option>TIJ-MEX</option>
                            <option>TIJ-SNQ</option>
                            <option>TIJ-SFL</option>
                            <option>TIJ-ESE</option>
                        </select>
                    </div>
                    <div>
                        <h3>Operador</h3>
                        <select>
                            <option selected disabled>Operador</option>
                            <option>1 - Héctor Armando Figueroa Orozco</option>
                            <option>2 - Juan Manuel Hernández Martínez</option>
                            <option>3 - Leonardo Ivan Valdez Galán</option>
                        </select>
                    </div>
                    
                </div>
                <div class="cajitas">
                    <div>
                        <h3>Fecha</h3>
                        <input type="date">
                    </div>
                    <div>
                        <h3>Salida</h3>
                        <input type="time" width="118px">
                    </div>
                    <div>
                        <h3>Llegada</h3>
                        <input type="time" width="118px">
                    </div>
                </div>
                <div class="cajitas">
                    <div>
                        <h3>Precio</h3>
                        <input type="number" min="100" max="3000" placeholder="Precio (M.X.N.)">
                    </div>
                    <div>
                        <h3>Autobús</h3>
                        <select>
                            <option selected disabled>Autobús</option>
                            <option>106 - IRIZA IRIZ6 (ERT56T)</option>
                            <option>118 - IRIZA IRIZ6 (BC09IJ)</option>
                            <option>130 - IRIZA IRIZ6 (DE29XU)</option>
                        </select>
                    </div>
                </div>

            </div>
        </form>
        <div style="height: max-content; padding: 70px 0px 0px 200px;">
            <button id="aceptarAgregar" class="btn-aceptar">Aceptar</button>
            <button id="cancelarAgregar" class="btn-cancelar">Cancelar</button>
        </div>
    </dialog>

    <!--*********************************DIALOGO PARA EDITAR*********************************-->
    <dialog id="editar" class="dialog-editar">
        <h1>Editar Corrida</h1>
        <form>
            <div class="cajitas">
                <div>
                    <h3>Corrida</h3>
                    <input type="number" min="0" max="3000" placeholder="Corrida a editar">
                </div>

                <div>
                    <h3>Operador</h3>
                    <select>
                        <option selected disabled>Operador</option>
                        <option>1 - Héctor Armando Figueroa Orozco</option>
                        <option>2 - Juan Manuel Hernández Martínez</option>
                        <option>3 - Leonardo Ivan Valdez Galán</option>
                    </select>
                </div>
            </div>
            
            <div>
                <h3>Autobús</h3>
                <select>
                    <option selected disabled>Autobús</option>
                    <option>106 - IRIZA IRIZ6 (ERT56T)</option>
                    <option>118 - IRIZA IRIZ6 (BC09IJ)</option>
                    <option>130 - IRIZA IRIZ6 (DE29XU)</option>
                </select>
            </div>

            <div class="cajitas">
                <div>
                    <h3>Fecha</h3>
                    <input type="date">
                </div>
                <div>
                    <h3>Salida</h3>
                    <input type="time" width="118px">
                </div>
                <div>
                    <h3>Llegada</h3>
                    <input type="time" width="118px">
                </div>
            </div>

        </form>
        <div style="height: max-content; padding: 5vh 0px 0px 200px;">
            <button id="aceptarEditar" class="btn-aceptar">Aceptar</button>
            <button id="cancelarEditar" class="btn-cancelar">Cancelar</button>
        </div>
    </dialog>


    <!--*********************************AREA DE BOTONES LATERALES Y TABLA GENERAL*********************************-->
    <div class="main-section">
        <div class="sidebar">
            <button class="side-btn agregar" id="abrirAgregar"></button>
            <button class="side-btn editar" id = "abrirEditar"></button>
            <div class="side-btn">+</div>
            <div class="side-btn">+</div>
            <div class="side-btn">+</div>
        </div>
        <!--*********************************AREA DE TABLA GENERAL*********************************-->
        <div class="content-box">
            <!-- aquí va la tabla después -->
            <tAblE>
                <thEaD>
                    <tR></tR>
                </thEaD>
            </tAblE>
        </div>
    </div>
    
    <script src="../statics/js/corridas.js"></script>
</body>
</html>
