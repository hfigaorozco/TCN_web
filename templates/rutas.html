<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Transportes Cuervo Negro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../statics/css/rutas.css">
</head>
<body>

<!-- ================= NAVBAR ================= -->

<div class="top-nav">

    <div class="logo-box">
        <img src="../statics/images/logo.png" alt="Logo TCN">
    </div>

    <div class="menu-box">
        <ul class="menu">
            <li><a href="index.html">Home</a></li>
            <li><a href="#">Reservaciones</a></li>
            <li><a href="corridas.html">Corridas</a></li>
            <li class="activea"><a href="rutas.html">Rutas</a></li>
            <li><a href="operadores.html">Operadores</a></li>
            <li><a href="autobuses.html">Autobuses</a></li>
        </ul>
    </div>

</div>

<!-- ================= CONTENEDOR ================= -->

<div class="container">
    <h1 class="title">Rutas</h1>

    <div class="cards">

        <div class="filter-box">
            <select>
                <option selected disabled>Origen</option>
                <option>Tijuana</option>
                <option>Mexicali</option>
                <option>Ensenada</option>
                <option>Tecate</option>
            </select>

            <select>
                <option selected disabled>Destino</option>
                <option>Tijuana</option>
                <option>Mexicali</option>
                <option>Ensenada</option>
                <option>Tecate</option>
            </select>
        </div>

    </div>
</div>

<!-- ================= SECCIÓN PRINCIPAL ================= -->

<div class="main-section">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <button class="side-btn agregar" id="abrirAgregar"></button>
        <button class="side-btn editar" id="abrirEditar"></button>
        <button class="side-btn fechaCiudad" id="abrirCiudad"></button>
    </div>

    <!-- TABLA -->
    <div class="content-box">
        <table class="table">
            <thead>
                <tr>
                    <th>Origen</th>
                    <th>Destino</th>
                    <th>Distancia (km)</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Tijuana</td>
                    <td>Mexicali</td>
                    <td>302</td>
                </tr>
                <tr>
                    <td>Tijuana</td>
                    <td>Tecate</td>
                    <td>202</td>
                </tr>
                <tr>
                    <td>Tijuana</td>
                    <td>Ensenada</td>
                    <td>504</td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

<!-- ================= DIALOG AGREGAR RUTA ================= -->

<dialog id="agregarRuta">
  <div class="dialog-content">
    <h2>Agregar Ruta</h2>

    <select>
      <option disabled selected>Seleccionar Origen</option>
      <option>Tijuana</option>
      <option>Mexicali</option>
      <option>Ensenada</option>
    </select>

    <select>
      <option disabled selected>Seleccionar Destino</option>
      <option>Tijuana</option>
      <option>Mexicali</option>
      <option>Ensenada</option>
    </select>

    <input type="number" placeholder="Distancia (km)" min="1">

    <div class="dialog-actions">
      <button class="btn btn-action btn-secondary" id="cancelarAgregarRuta">Cancelar</button>
      <button class="btn btn-action btn-primary" id="aceptarAgregarRuta">Guardar</button>
    </div>
  </div>
</dialog>

<!-- ================= DIALOG EDITAR RUTA ================= -->

<dialog id="editarRuta">
  <div class="dialog-content">
    <h2>Editar Ruta</h2>

    <input type="text" value="Tijuana" disabled>
    <input type="text" value="Mexicali" disabled>
    <input type="number" placeholder="Nueva Distancia (km)" min="1">

    <div class="dialog-actions">
      <button class="btn btn-action btn-secondary" id="cancelarEditarRuta">Cancelar</button>
      <button class="btn btn-action btn-primary" id="aceptarEditarRuta">Actualizar</button>
    </div>
  </div>
</dialog>

<!-- ================= DIALOG AGREGAR CIUDAD ================= -->

<dialog id="agregarCiudad">
  <div class="dialog-content">
    <h2>Agregar Ciudad</h2>

    <table class="table">
      <thead>
        <tr>
          <th>Código</th>
          <th>Ciudad</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>TJ</td>
          <td>Tijuana</td>
        </tr>
        <tr>
          <td>MX</td>
          <td>Mexicali</td>
        </tr>
      </tbody>
    </table>

    <input type="text" placeholder="Código">
    <input type="text" placeholder="Nombre de la ciudad">

    <div class="dialog-actions">
      <button class="btn btn-action btn-secondary" id="cancelarCiudad">Cancelar</button>
      <button class="btn btn-action btn-primary" id="aceptarCiudad">Guardar</button>
    </div>

  </div>
</dialog>

<script src="../statics/js/rutas.js" defer></script>

</body>
</html>
