{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Transportes Cuervo Negro</title>

    <!-- STATIC -->
    <link rel="stylesheet" href="{% static 'css/registro.css' %}">
</head>
<body>

<div class="page-wrapper">

    <main class="container">

        <section class="image-section" aria-hidden="true">
            <img src="{% static 'images/buses registro.png' %}" alt="Autobuses de TCN">
        </section>

        <section class="form-section">

            <header class="form-header">
                <img src="{% static 'images/logo.png' %}" alt="Logo Transportes Cuervo Negro" class="logo">
                <h1>Registro de nuevos usuarios</h1>
            </header>

            <div class="aviso" role="alert">
                <img src="{% static 'images/advertencia.png' %}" alt="Advertencia" class="icono-aviso">
                <p>Los roles de cada usuario definen las opciones del sistema con las que tendrá permitido interactuar.</p>
            </div>

            {% if error %}
            <div class="aviso aviso--error" role="alert">
                <p>{{ error }}</p>
            </div>
            {% endif %}

            <form method="post" novalidate>
                {% csrf_token %}

                <div class="form-group">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" name="nombre" maxlength="100" placeholder="Ingresa el nombre del nuevo usuario" required>
                </div>

                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="correo" maxlength="40" placeholder="Ingresa el correo electrónico" required>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" maxlength="32" placeholder="Ingresa la contraseña" required>
                </div>

                <div class="form-footer">

                    <div class="form-group form-group--select">
                        <label for="rol">Rol del usuario</label>
                        <select id="rol" name="rol" required>
                            <option value="" disabled selected>Seleccionar</option>
                            <option value="admin">Administrador</option>
                            <option value="taquillero">Taquillero</option>
                        </select>
                    </div>

                    <button type="submit" class="btn-primary">Crear cuenta</button>

                </div>

            </form>

        </section>

    </main>

</div>

</body>
</html>
